# macOS: auto-sign local builds so Gatekeeper doesn't kill the binary
[target.x86_64-apple-darwin]
rustflags = []
[target.aarch64-apple-darwin]
rustflags = []

# After each build, sign the binary so `deepseek` runs without zsh: killed
# This only works for `--release` builds (debug builds don't need signing).
# If codesign fails, the build still succeeds — it's best-effort.
